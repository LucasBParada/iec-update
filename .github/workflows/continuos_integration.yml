name: Continuous Integration with Github Actions

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

#Faz a cópia do código para dentro da maquina ubuntu
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

#Instala e configura o java dentro da maquina ubuntu
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

#Compila o codigo e gera o artefato .jar
      - name: Build Application JAR
        run: mvn clean package

#Executa os testes junit
      - name: Run test
        run: mvn test

#Login no docker hub
      - name: Login in Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

#Construção da Docker Image
      - name: Build da docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/aula21_with_spring_junit:latest .

#Alterar a tag da docker image
      - name: Tag docker image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/aula21_with_spring_junit:latest \
          ${{ secrets.DOCKER_USERNAME }}/aula21_with_spring_junit:${{ github.run_id }}

#Publicar a docker image no DockerHub
      - name: Publish in DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/aula21_with_spring_junit:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/aula21_with_spring_junit:${{ github.run_id }}